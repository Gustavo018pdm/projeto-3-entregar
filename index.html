<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meu cartão digital</title>
     <style>
        /* Estilos para o cartão digital */

    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:'segoe ui', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;

    }

    .perfil-container {
        text-align: center;
        max-width: 400px;
        width: 100%;
    }

    h1{
        font-size: 2.5rem;
        color: #333;
        margin-bottom: 20px;
        font-weight: 600;
    }

      .avatar-container {
            width: 290px;
            height: 290px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #52a3e6; /* Cor da borda sutil */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            font-size: 1.8rem;
            color: #555;
            margin-bottom: 10px;
        }

       .descricao {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.4;
            padding: 0 10px;
        }


        .links-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-direction: column;
            max-width: center;
            align-items: center;
        }

     .btn-link {
            display: block;
            background-color: #4ca3dd; /* Azul dos botões do print */
            color: #ffffff;
            text-decoration: none;
            padding: 12px;
            
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-link:hover {
            background-color: #3b8ac4; /* Azul mais escuro ao passar o mouse */
            transform: translateY(-2px);
        }

        .btn-link:active {
            transform: translateY(1px);
        }

        p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.6;
        }

    .descricoes {
    text-align: center;
    padding: 5px;
}

.descricoes h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 3rem;
   
}

    </style>
</head>
<body>
  <header>

    
  <div class="perfil-container">

   

        <h1>Bem-vindo ao meu Perfil</h1>

        <div class="avatar-container">
            <img class="avatar-img" src="WhatsApp Image 2026-06-26 at 20.48.49.jpeg" alt="Sua Foto de Perfil">
        </div>

        <div class="descricoes">
           <strong><h1>Giovanna</h1></strong>
        </div>

        <h2>Desenvolvedor Front-End</h2>
        <p class="descricao">Criando códigos limpos e resolvendo problemas reais através da tecnologia.</p>

        <div class="links-group">
            <a href="https://linkedin.com" target="_blank" class="btn-link">Meu LinkedIn</a>
            <a href="https://github.com/Gustavo018pdm/projeto-3-entregar" target="_blank" class="btn-link">Meu GitHub</a>
            <a href="#" class="btn-link">Meu Portfólio</a>
        </div>

        <footer>
            &copy; 2026 - Desenvolvido em Aula
        </footer>
    </div>
  </header>
</body>
</html>
